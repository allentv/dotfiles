# mise settings — ~/.config/mise/settings.toml
# Full reference: https://mise.jdx.dev/configuration/settings.html

# Parallelise tool installs (default is 4; raise if you have many cores)
jobs = 4

# Keep downloaded archives between installs — speeds up re-installs but costs disk
always_keep_download = false

# Warn (don't fail) when a tool version listed in config.toml isn't installed
# instead of silently using a different version
not_found_auto_install = true
