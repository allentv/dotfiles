# ── Prefix ─────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ─────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"  # true colour
set -g escape-time 10                       # faster escape (important for vim)
set -g history-limit 50000
set -g mouse on
set -g base-index 1                         # windows start at 1
set -g pane-base-index 1                    # panes start at 1
set -g renumber-windows on                  # renumber on close

# ── Key bindings ─────────────────────────────────────────────────────────────
# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Copy mode ────────────────────────────────────────────────────────────────
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Status bar ───────────────────────────────────────────────────────────────
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[default] "
set -g status-right "#[fg=#a6adc8] %H:%M  %d %b #[fg=#89b4fa]#h "

set -g window-status-format "#[fg=#a6adc8] #I #W "
set -g window-status-current-format "#[bg=#313244,fg=#cdd6f4,bold] #I #W "

# Highlight windows with activity
set -g monitor-activity on
set -g visual-activity off
set -g window-status-activity-style "fg=#f9e2af"

# ── Pane borders ─────────────────────────────────────────────────────────────
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
